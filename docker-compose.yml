services:
  # ─────────────────────────────────────────────
  # Xagent Agent (one-shot query)
  #   docker compose run --rm xagent-agent -m "Hello"
  # ─────────────────────────────────────────────
  xagent-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xagent-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/root/.xagent/config.json:ro
      - xagent-workspace:/root/.xagent/workspace
    entrypoint: ["xagent", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Xagent Gateway (Long-running Bot)
  #   docker compose up xagent-gateway
  # ─────────────────────────────────────────────
  xagent-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xagent-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/root/.xagent/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - xagent-workspace:/root/.xagent/workspace
    command: ["gateway"]

volumes:
  xagent-workspace:
