name: build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: fmt
        run: |
          make fmt
          git diff --exit-code || (echo "::error::Code is not formatted. Run 'make fmt' and commit the changes." && exit 1)

      # SWE100821: Run vet and test on push (was PR-only)
      - name: Run go generate
        run: go generate ./...

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build
        run: make build-all
